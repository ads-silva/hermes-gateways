services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
